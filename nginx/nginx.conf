events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:3001;
    }

    upstream indexer {
        server indexer:3002;
    }

    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name api.oceanwatch.xyz;

        ssl_certificate /etc/letsencrypt/live/oceanwatch.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/oceanwatch.xyz/privkey.pem;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name indexer.oceanwatch.xyz;

        ssl_certificate /etc/letsencrypt/live/oceanwatch.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/oceanwatch.xyz/privkey.pem;

        location / {
            proxy_pass http://indexer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 443 ssl;
        server_name oceanwatch.xyz;

        ssl_certificate /etc/letsencrypt/live/oceanwatch.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/oceanwatch.xyz/privkey.pem;

        root /var/www/frontend;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
